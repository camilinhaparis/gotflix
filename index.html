<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Gotflix</title>
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>Gotflix</h1>
        <p>Select a profile</p>
      </div>
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Alternar modo escuro/claro"
      >
        <span class="icon">🌙</span>
      </button>
    </header>

    <main>
      <section aria-labelledby="profiles-title" class="profiles">
        <h2 id="profiles-title">Who is watching?</h2>

        <div class="profiles-list" id="profiles-list">
          <!-- Profiles will be loaded here -->
        </div>
        <div class="botao">
          <button id="manage-profiles" aria-label="Gerenciar perfis existentes">
            Manage profiles
          </button>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Gotflix, Inc.</p>
    </footer>
    <script src="js/theme.js"></script>
    <script src="js/profiles.js"></script>
  </body>
</html>
